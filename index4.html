<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>雙面板工作台</title>
<style>
  :root{
    --bg:#101418;
    --panel:#171d23;
    --line:#2a333c;
    --ink:#e7edf3;
    --muted:#8b9aa8;
    --accent:#5fd0c5;
    --bar:52px;
    --gap:8px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#eef1f4; --panel:#ffffff; --line:#d6dde4;
      --ink:#1b2229; --muted:#65727e; --accent:#0f8f83;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Inter","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
  }

  /* ---------- 版面骨架 ---------- */
  .stage{
    height:100dvh;
    display:grid;
    gap:var(--gap);
    padding:var(--gap);
    /* 桌機：左右並排，中間可拖曳 */
    grid-template-columns:var(--split,1fr) 6px 1fr;
    grid-template-rows:1fr;
  }

  .pane{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;min-height:0;
  }

  .pane-bar{
    height:var(--bar);
    flex:0 0 var(--bar);
    display:flex;align-items:center;gap:10px;
    padding:0 12px;
    border-bottom:1px solid var(--line);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:0 0 8px}
  .pane-title{
    font-size:13px;font-weight:600;letter-spacing:.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .spacer{flex:1}
  .btn{
    appearance:none;border:1px solid var(--line);background:transparent;
    color:var(--muted);border-radius:7px;
    height:30px;padding:0 10px;font-size:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:5px;
    transition:color .15s,border-color .15s;
  }
  .btn:hover{color:var(--ink);border-color:var(--accent)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  .frame-wrap{flex:1;position:relative;min-height:0;background:var(--panel)}
  iframe{width:100%;height:100%;border:0;display:block}

  /* 讀取提示 */
  .hint{
    position:absolute;inset:0;display:grid;place-content:center;
    text-align:center;padding:24px;color:var(--muted);font-size:13px;
    pointer-events:none;transition:opacity .4s;
  }
  .hint.gone{opacity:0}

  /* ---------- 拖曳分隔線 ---------- */
  .divider{
    border-radius:99px;background:var(--line);
    cursor:col-resize;position:relative;
    transition:background .15s;
  }
  .divider:hover,.divider.active{background:var(--accent)}
  .divider::after{
    content:"";position:absolute;inset:-6px;
  }

  body.dragging{cursor:col-resize;user-select:none}
  body.dragging iframe{pointer-events:none}

  /* ---------- 手機：上下排列 ---------- */
  @media (max-width:820px){
    .stage{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1fr;
    }
    .divider{display:none}
  }

  /* 單面板放大檢視 */
  .stage.solo-a{grid-template-columns:1fr;grid-template-rows:1fr}
  .stage.solo-a .divider,.stage.solo-a #paneB{display:none}
  .stage.solo-b{grid-template-columns:1fr;grid-template-rows:1fr}
  .stage.solo-b .divider,.stage.solo-b #paneA{display:none}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<main class="stage" id="stage">

  <section class="pane" id="paneA">
    <header class="pane-bar">
      <span class="dot"></span>
      <span class="pane-title">畫面一</span>
      <span class="spacer"></span>
      <button class="btn" data-reload="frameA" title="重新載入">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
        重載
      </button>
      <button class="btn" data-solo="a" title="放大這個畫面">
        <svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
        放大
      </button>
    </header>
    <div class="frame-wrap">
      <iframe id="frameA" title="畫面一"
        src="https://script.google.com/macros/s/AKfycbwghGXCE6Hzxw3cSBQnjvnq7rCxHa5wvsHaGCUZsHhy9Zqe9yjXydQm7QGE3RTyGBjI/exec"
        loading="eager" allow="clipboard-write; fullscreen"></iframe>
      <div class="hint" id="hintA">載入中…</div>
    </div>
  </section>

  

</main>

<script>
(function(){
  var stage = document.getElementById('stage');
  var divider = document.getElementById('divider');

  /* 載入提示 */
  [['frameA','hintA'],['frameB','hintB']].forEach(function(p){
    var f = document.getElementById(p[0]), h = document.getElementById(p[1]);
    f.addEventListener('load', function(){ h.classList.add('gone'); });
    setTimeout(function(){ h.classList.add('gone'); }, 8000);
  });

  /* 重新載入 */
  document.querySelectorAll('[data-reload]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var f = document.getElementById(btn.dataset.reload);
      f.src = f.src;
    });
  });

  /* 放大 / 還原 */
  document.querySelectorAll('[data-solo]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var cls = 'solo-' + btn.dataset.solo;
      var on = stage.classList.contains(cls);
      stage.classList.remove('solo-a','solo-b');
      if(!on) stage.classList.add(cls);
      btn.lastChild.nodeValue = on ? ' 放大' : ' 還原';
      document.querySelectorAll('[data-solo]').forEach(function(o){
        if(o !== btn) o.lastChild.nodeValue = ' 放大';
      });
    });
  });

  /* 拖曳調整左右比例（桌機） */
  var dragging = false;
  function setSplit(x){
    var pad = 8, min = 220;
    var total = window.innerWidth - pad*2;
    var left = Math.min(Math.max(x - pad, min), total - min - 6);
    stage.style.setProperty('--split', left + 'px');
  }
  divider.addEventListener('pointerdown', function(e){
    dragging = true; divider.classList.add('active');
    document.body.classList.add('dragging');
    divider.setPointerCapture(e.pointerId);
  });
  divider.addEventListener('pointermove', function(e){
    if(dragging) setSplit(e.clientX);
  });
  divider.addEventListener('pointerup', function(){
    dragging = false; divider.classList.remove('active');
    document.body.classList.remove('dragging');
  });
  divider.addEventListener('keydown', function(e){
    var cur = parseFloat(getComputedStyle(stage).getPropertyValue('--split')) || window.innerWidth/2;
    if(e.key === 'ArrowLeft'){ setSplit(cur - 24); e.preventDefault(); }
    if(e.key === 'ArrowRight'){ setSplit(cur + 24); e.preventDefault(); }
  });
  window.addEventListener('resize', function(){
    if(window.innerWidth <= 820) stage.style.removeProperty('--split');
  });
})();
</script>
</body>
</html>
