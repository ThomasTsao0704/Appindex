<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INDEX — 應用目錄</title>
<meta name="description" content="以卡片目錄的方式收納並開啟你的所有應用程式">
<meta name="theme-color" content="#16211B">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INDEX">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#16211B;
    --ink-2:#1c281f;
    --panel:#1F2C24;
    --panel-line:#33453a;
    --parchment:#E8DFC8;
    --parchment-dim:#c9c0a6;
    --brass:#C89B3C;
    --brass-bright:#e0b658;
    --rust:#C4573B;
    --radius:14px;
    --font-display:'Fraunces', serif;
    --font-body:'IBM Plex Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #1b2a20 0%, transparent 60%),
      var(--ink);
    color:var(--parchment);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }

  a{ color:inherit; }
  button{ font-family:inherit; }

  /* ---------- Header / drawer face ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--ink) 70%, transparent);
    backdrop-filter:blur(6px);
    padding:22px 20px 14px;
    border-bottom:1px solid var(--panel-line);
  }
  .brand{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    max-width:1100px; margin:0 auto;
  }
  .brand-mark{ display:flex; align-items:baseline; gap:10px; }
  .brand-mark h1{
    font-family:var(--font-display); font-weight:700; font-size:clamp(26px,4vw,34px);
    letter-spacing:0.5px; margin:0; color:var(--parchment);
  }
  .brand-mark .tab{
    font-family:var(--font-mono); font-size:11px; letter-spacing:1.5px;
    background:var(--brass); color:var(--ink); padding:3px 8px; border-radius:4px;
    transform:translateY(-6px);
  }
  .brand-count{
    font-family:var(--font-mono); font-size:12px; color:var(--parchment-dim);
    white-space:nowrap;
  }

  .toolbar{
    max-width:1100px; margin:16px auto 0; display:flex; gap:10px; align-items:center;
  }
  .search{
    flex:1; position:relative;
  }
  .search input{
    width:100%; background:var(--panel); border:1px solid var(--panel-line);
    color:var(--parchment); font-family:var(--font-mono); font-size:14px;
    padding:12px 14px 12px 34px; border-radius:10px; outline:none;
  }
  .search input::placeholder{ color:var(--parchment-dim); }
  .search input:focus{ border-color:var(--brass); box-shadow:0 0 0 3px rgba(200,155,60,0.15); }
  .search svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:0.6; }

  .install-btn{
    display:none; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--brass); color:var(--brass-bright);
    padding:11px 14px; border-radius:10px; font-size:13px; cursor:pointer;
    white-space:nowrap;
  }
  .install-btn:hover{ background:rgba(200,155,60,0.1); }
  .install-btn.show{ display:inline-flex; }

  /* ---------- Alphabet rail ---------- */
  .rail{
    max-width:1100px; margin:12px auto 0; display:flex; gap:6px; overflow-x:auto;
    padding-bottom:4px; scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{ display:none; }
  .rail button{
    flex:0 0 auto; background:none; border:none; color:var(--parchment-dim);
    font-family:var(--font-mono); font-size:12px; padding:4px 7px; cursor:pointer;
    border-radius:5px;
  }
  .rail button:hover, .rail button:focus-visible{ color:var(--brass-bright); outline:1px solid var(--brass); }

  /* ---------- Main content ---------- */
  main{ max-width:1100px; margin:0 auto; padding:20px 20px 80px; }

  .section-label{
    font-family:var(--font-display); font-weight:600; font-size:15px;
    color:var(--brass); margin:30px 0 12px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:''; flex:1; height:1px; background:var(--panel-line); }
  .section-label:first-child{ margin-top:0; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:14px;
  }

  .card{
    position:relative;
    background:var(--panel); border:1px solid var(--panel-line); border-radius:var(--radius);
    padding:18px 16px 16px; text-decoration:none; color:inherit;
    display:flex; flex-direction:column; gap:8px; min-height:150px;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card::before{
    content:''; position:absolute; top:-1px; right:16px; width:34px; height:8px;
    background:var(--brass); border-radius:0 0 4px 4px;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-3px);
    border-color:var(--brass);
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    outline:none;
  }
  .card .no{
    font-family:var(--font-mono); font-size:11px; color:var(--parchment-dim); letter-spacing:1px;
  }
  .card h2{
    font-family:var(--font-display); font-weight:600; font-size:19px; margin:0;
    color:var(--parchment); line-height:1.25;
  }
  .card p{
    font-size:13.5px; line-height:1.55; color:var(--parchment-dim);
    margin:0; flex:1;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card .foot{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin-top:4px; padding-top:10px; border-top:1px dashed var(--panel-line);
  }
  .card .domain{
    font-family:var(--font-mono); font-size:11px; color:var(--brass-bright);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card .go{ opacity:0.7; }
  .card:hover .go{ opacity:1; }

  /* ---------- States ---------- */
  .state{
    text-align:center; padding:70px 20px; color:var(--parchment-dim);
  }
  .state h3{
    font-family:var(--font-display); color:var(--parchment); font-size:20px; margin:0 0 8px;
  }
  .state p{ font-size:13.5px; margin:0 0 16px; }
  .state code{
    font-family:var(--font-mono); background:var(--panel); padding:2px 6px; border-radius:4px;
  }
  .retry{
    background:var(--brass); color:var(--ink); border:none; padding:10px 18px;
    border-radius:8px; font-family:var(--font-mono); font-size:12.5px; cursor:pointer; font-weight:600;
  }

  .skeleton-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px; }
  .skeleton{
    height:150px; border-radius:var(--radius); background:linear-gradient(100deg, var(--panel) 40%, #263427 50%, var(--panel) 60%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
    border:1px solid var(--panel-line);
  }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }

  footer{
    text-align:center; padding:20px; color:var(--parchment-dim); font-family:var(--font-mono); font-size:11px;
    opacity:0.6;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">
      <h1>INDEX</h1>
      <span class="tab">目錄</span>
    </div>
    <div class="brand-count" id="count">— 筆項目</div>
  </div>
  <div class="toolbar">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="搜尋應用程式或說明…" autocomplete="off">
    </div>
    <button class="install-btn" id="installBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      安裝到主畫面
    </button>
  </div>
  <nav class="rail" id="rail" aria-label="字母索引"></nav>
</header>

<main id="main">
  <div class="skeleton-grid" id="skeleton">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</main>

<footer>INDEX · 由 Google 試算表驅動</footer>

<script>
/* =====================================================================
 * 設定：把下面這行換成你部署 Apps Script 後拿到的網址（結尾是 /exec）
 * ===================================================================== */
const API_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

const els = {
  main: document.getElementById('main'),
  skeleton: document.getElementById('skeleton'),
  count: document.getElementById('count'),
  search: document.getElementById('searchInput'),
  rail: document.getElementById('rail'),
  installBtn: document.getElementById('installBtn'),
};

let allApps = [];

function domainOf(url){
  try{ return new URL(url).hostname.replace(/^www\./,''); }
  catch(e){ return url; }
}

function groupByLetter(apps){
  const groups = {};
  apps.forEach(a=>{
    let letter = (a.app.trim()[0] || '#').toUpperCase();
    if(!/[A-Z]/.test(letter)) letter = '#';
    (groups[letter] ||= []).push(a);
  });
  return Object.keys(groups).sort().map(letter=>({ letter, items: groups[letter] }));
}

function renderState(kind){
  if(kind === 'error'){
    els.main.innerHTML = `
      <div class="state">
        <h3>目錄暫時讀不到資料</h3>
        <p>請確認 <code>API_URL</code> 是否已換成你的 Apps Script 部署網址，且部署權限為「任何人」。</p>
        <button class="retry" id="retryBtn">重新讀取</button>
      </div>`;
    document.getElementById('retryBtn').onclick = load;
  } else if(kind === 'empty'){
    els.main.innerHTML = `
      <div class="state">
        <h3>目錄是空的</h3>
        <p>在試算表加入一列資料（App / Url / Describe），重新整理這頁即可看到新卡片。</p>
      </div>`;
  }
}

function render(apps){
  els.count.textContent = `${apps.length} 筆項目`;

  if(apps.length === 0){
    renderState('empty');
    els.rail.innerHTML = '';
    return;
  }

  const groups = groupByLetter(apps);

  els.rail.innerHTML = groups.map(g=>`<button data-letter="${g.letter}">${g.letter}</button>`).join('');
  els.rail.querySelectorAll('button').forEach(btn=>{
    btn.onclick = ()=>{
      document.getElementById('sec-'+btn.dataset.letter)?.scrollIntoView({behavior:'smooth', block:'start'});
    };
  });

  els.main.innerHTML = groups.map(g=>`
    <h2 class="section-label" id="sec-${g.letter}">${g.letter}</h2>
    <div class="grid">
      ${g.items.map(a=>`
        <a class="card" href="${a.url}" target="_blank" rel="noopener noreferrer">
          <span class="no">No. ${String(a.id).padStart(3,'0')}</span>
          <h2>${escapeHtml(a.app)}</h2>
          <p>${escapeHtml(a.describe || '（尚無說明）')}</p>
          <div class="foot">
            <span class="domain">${escapeHtml(domainOf(a.url))}</span>
            <svg class="go" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
          </div>
        </a>
      `).join('')}
    </div>
  `).join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function applyFilter(){
  const q = els.search.value.trim().toLowerCase();
  if(!q){ render(allApps); return; }
  const filtered = allApps.filter(a =>
    a.app.toLowerCase().includes(q) || (a.describe||'').toLowerCase().includes(q)
  );
  if(filtered.length === 0){
    els.main.innerHTML = `<div class="state"><h3>沒有符合的項目</h3><p>試試別的關鍵字。</p></div>`;
    els.count.textContent = '0 筆項目';
    els.rail.innerHTML = '';
  } else {
    render(filtered);
  }
}

async function load(){
  els.main.innerHTML = '';
  els.main.appendChild(els.skeleton);
  els.skeleton.style.display = 'grid';

  try{
    const res = await fetch(`${API_URL}?action=list`, { cache:'no-store' });
    if(!res.ok) throw new Error('bad status');
    const data = await res.json();
    if(!data.ok) throw new Error('bad payload');
    allApps = data.apps;
    render(allApps);
  } catch(err){
    renderState('error');
  }
}

els.search.addEventListener('input', applyFilter);
load();

/* ---------- PWA install prompt ---------- */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  els.installBtn.classList.add('show');
});
els.installBtn.addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  els.installBtn.classList.remove('show');
});
window.addEventListener('appinstalled', ()=>{
  els.installBtn.classList.remove('show');
});

/* ---------- Service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
