<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INDEX — 應用目錄</title>
<meta name="description" content="以卡片目錄的方式收納並開啟你的所有應用程式">
<meta name="theme-color" content="#16211B">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INDEX">

<!-- 只保留一套標題字型（中文本來就會落到系統字型，載三套是純浪費） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#16211B;
    --panel:#1F2C24;
    --panel-hi:#26362c;
    --panel-line:#33453a;
    --parchment:#E8DFC8;
    --parchment-dim:#a9a48f;
    --brass:#C89B3C;
    --brass-bright:#e0b658;
    --rust:#C4573B;
    --radius:14px;
    --font-display:'Fraunces', Georgia, 'Noto Serif TC', serif;
    --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC',
                'PingFang TC', 'Microsoft JhengHei', sans-serif;
    --font-mono:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --header-h:150px;
    --bar-h:calc(58px + env(safe-area-inset-bottom, 0px));
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(900px 500px at 15% -10%, #1b2a20 0%, transparent 60%),
      var(--ink);
    color:var(--parchment);
    font-family:var(--font-body);
    min-height:100dvh;
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ animation-duration:.01ms !important; transition-duration:.01ms !important; }
  }
  a{ color:inherit; text-decoration:none; }
  button, select, input{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }

  /* ================= 頂部：捲動時自動收合品牌列 ================= */
  header{
    position:sticky; top:0; z-index:30;
    background:rgba(22,33,27,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--panel-line);
    padding:calc(10px + env(safe-area-inset-top, 0px)) 14px 8px;
  }
  .wrap{ max-width:1100px; margin:0 auto; }

  .brand{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    height:34px; overflow:hidden;
    transition:height .18s ease, opacity .18s ease, margin .18s ease;
  }
  header.compact .brand{ height:0; opacity:0; margin-bottom:-6px; }
  .brand-mark{ display:flex; align-items:baseline; gap:8px; }
  .brand-mark h1{
    font-family:var(--font-display); font-weight:700; font-size:26px;
    letter-spacing:.5px; margin:0;
  }
  .brand-mark .tab{
    font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px;
    background:var(--brass); color:var(--ink); padding:2px 7px; border-radius:4px;
  }
  .brand-actions{ display:flex; align-items:center; gap:4px; }
  .icon-btn{
    width:38px; height:38px; display:grid; place-items:center;
    background:none; border:none; color:var(--parchment-dim); border-radius:10px;
    cursor:pointer;
  }
  .icon-btn:active{ background:var(--panel-hi); color:var(--brass-bright); }
  .icon-btn.accent{ color:var(--brass-bright); }
  .icon-btn[hidden]{ display:none; }
  .icon-btn.spin svg{ animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* 搜尋 */
  .search{ position:relative; margin-top:6px; }
  .search input{
    width:100%; background:var(--panel); border:1px solid var(--panel-line);
    color:var(--parchment); font-size:16px; /* 16px 才不會讓 iOS 自動放大頁面 */
    padding:12px 42px 12px 38px; border-radius:12px; outline:none;
    appearance:none; -webkit-appearance:none;
  }
  .search input::-webkit-search-cancel-button{ display:none; }
  .search input::placeholder{ color:var(--parchment-dim); }
  .search input:focus{ border-color:var(--brass); }
  .search .ico{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.55; }
  .search .clear{
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    width:38px; height:38px; display:none; place-items:center;
    background:none; border:none; color:var(--parchment-dim); cursor:pointer;
  }
  .search.filled .clear{ display:grid; }

  /* 篩選膠囊：單排橫向捲動，不再佔第二、三排高度 */
  .chips{
    display:flex; gap:6px; overflow-x:auto; margin-top:8px;
    padding-bottom:2px; scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chips button{
    flex:0 0 auto; background:transparent; border:1px solid var(--panel-line);
    color:var(--parchment-dim); font-size:12.5px; padding:7px 12px;
    border-radius:999px; cursor:pointer; min-height:34px;
  }
  .chips button.active{ background:var(--brass); border-color:var(--brass); color:var(--ink); font-weight:600; }
  .chips button.clear-tags{ color:var(--rust); border-color:transparent; }

  /* A–Z 快速跳頁 */
  .rail{
    display:flex; gap:2px; overflow-x:auto; margin-top:6px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .rail::-webkit-scrollbar{ display:none; }
  .rail[hidden]{ display:none; }
  .rail button{
    flex:0 0 auto; min-width:32px; height:32px;
    background:none; border:none; color:var(--parchment-dim);
    font-family:var(--font-mono); font-size:12.5px; border-radius:8px; cursor:pointer;
  }
  .rail button:active{ background:var(--brass); color:var(--ink); }

  /* ================= 內容 ================= */
  main{
    max-width:1100px; margin:0 auto;
    padding:14px 14px calc(var(--bar-h) + 24px);
  }
  .section-label{
    font-family:var(--font-display); font-weight:600; font-size:14px;
    color:var(--brass); margin:22px 0 10px; display:flex; align-items:center; gap:10px;
    scroll-margin-top:calc(var(--header-h) + 8px);
  }
  .section-label::after{ content:''; flex:1; height:1px; background:var(--panel-line); }
  .section-label:first-child{ margin-top:2px; }

  /* 手機兩欄，桌機自動加寬 */
  .grid{ display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }
  @media (min-width:520px){
    .grid{ grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; }
    main{ padding:20px 20px 40px; }
  }

  .card{
    position:relative; background:var(--panel);
    border:1px solid var(--panel-line); border-radius:var(--radius);
    padding:14px 12px 12px; display:flex; flex-direction:column; gap:6px;
    min-height:132px; transition:transform .12s ease, border-color .12s ease;
  }
  .card::before{
    content:''; position:absolute; top:-1px; right:14px; width:28px; height:7px;
    background:var(--brass); border-radius:0 0 4px 4px;
  }
  .card:active{ transform:scale(.975); border-color:var(--brass); }
  @media (hover:hover){
    .card:hover{ transform:translateY(-3px); border-color:var(--brass); box-shadow:0 10px 24px rgba(0,0,0,.35); }
  }
  .stretched-link{ position:absolute; inset:0; z-index:1; border-radius:inherit; }
  .card > *:not(.stretched-link):not(.star){ position:relative; z-index:2; pointer-events:none; }

  .no{ font-family:var(--font-mono); font-size:10px; color:var(--parchment-dim); letter-spacing:1px; }
  .card h2{
    font-family:var(--font-display); font-weight:600; font-size:16px; margin:0;
    line-height:1.3; overflow-wrap:anywhere;
  }
  .card p{
    font-size:12.5px; line-height:1.5; color:var(--parchment-dim); margin:0; flex:1;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .tag-row{ display:flex; gap:4px; flex-wrap:wrap; }
  .tag-pill{
    font-family:var(--font-mono); font-size:9.5px; color:var(--brass-bright);
    border:1px solid var(--panel-line); padding:2px 6px; border-radius:999px;
  }
  .foot{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding-top:8px; border-top:1px dashed var(--panel-line);
  }
  .domain{
    font-family:var(--font-mono); font-size:10px; color:var(--brass-bright);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  /* 星星：44×44 的觸控範圍，圖示維持小巧 */
  .star{
    position:absolute; top:0; right:0; z-index:3;
    width:44px; height:44px; display:grid; place-items:center;
    background:none; border:none; cursor:pointer;
    font-size:17px; line-height:1; color:#3d5145; padding:0;
    transition:transform .12s ease, color .12s ease;
  }
  .star.active{ color:var(--brass); }
  .star:active{ transform:scale(1.25); }

  /* ================= 狀態 ================= */
  .state{ text-align:center; padding:56px 16px; color:var(--parchment-dim); }
  .state h3{ font-family:var(--font-display); color:var(--parchment); font-size:18px; margin:0 0 8px; }
  .state p{ font-size:13.5px; margin:0 0 16px; line-height:1.6; }
  .state code{ font-family:var(--font-mono); background:var(--panel); padding:2px 6px; border-radius:4px; }
  .retry{
    background:var(--brass); color:var(--ink); border:none; padding:12px 22px;
    border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; min-height:44px;
  }
  .skeleton-grid{ display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }
  @media (min-width:520px){ .skeleton-grid{ grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; } }
  .skeleton{
    height:132px; border-radius:var(--radius); border:1px solid var(--panel-line);
    background:linear-gradient(100deg, var(--panel) 40%, var(--panel-hi) 50%, var(--panel) 60%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }

  /* 離線提示 */
  .offline{
    display:none; align-items:center; gap:8px; margin:0 0 12px;
    background:rgba(196,87,59,.12); border:1px solid rgba(196,87,59,.4);
    color:#e8a08c; font-size:12.5px; padding:9px 12px; border-radius:10px;
  }
  .offline.show{ display:flex; }

  /* ================= 底部分頁列（拇指區） ================= */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    display:grid; grid-template-columns:repeat(4,1fr);
    background:rgba(22,33,27,.94); backdrop-filter:blur(10px);
    border-top:1px solid var(--panel-line);
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  .tabbar button{
    background:none; border:none; color:var(--parchment-dim); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; height:58px; font-size:11px;
  }
  .tabbar button.active{ color:var(--brass-bright); }
  .tabbar .dot{ width:4px; height:4px; border-radius:50%; background:transparent; }
  .tabbar button.active .dot{ background:var(--brass); }
  @media (min-width:900px){
    .tabbar{ position:sticky; max-width:1100px; margin:0 auto 20px; border-radius:14px; border:1px solid var(--panel-line); bottom:20px; }
  }

  footer{
    text-align:center; padding:4px 20px 0; color:var(--parchment-dim);
    font-family:var(--font-mono); font-size:10.5px; opacity:.5;
  }
</style>
</head>
<body>

<header id="header">
  <div class="wrap">
    <div class="brand">
      <div class="brand-mark">
        <h1>INDEX</h1>
        <span class="tab">目錄</span>
      </div>
      <div class="brand-actions">
        <span class="no" id="count" style="margin-right:4px"></span>
        <button class="icon-btn" id="refreshBtn" aria-label="重新讀取目錄">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
        </button>
        <button class="icon-btn accent" id="installBtn" aria-label="安裝到主畫面" hidden>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        </button>
      </div>
    </div>

    <div class="search" id="searchWrap">
      <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="search" inputmode="search" enterkeyhint="search"
             placeholder="搜尋名稱、說明或標籤…" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="clear" id="clearSearch" aria-label="清除搜尋">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <nav class="chips" id="chips" aria-label="標籤篩選"></nav>
    <nav class="rail" id="rail" aria-label="字母索引"></nav>
  </div>
</header>

<main id="main">
  <div class="offline" id="offlineNote">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
    <span>目前顯示上次存下的目錄，連上網路後會自動更新。</span>
  </div>
  <div class="skeleton-grid" id="skeleton">
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
  </div>
</main>

<nav class="tabbar" id="tabbar" aria-label="檢視模式">
  <button data-view="alpha" class="active"><span>目錄</span><span class="dot"></span></button>
  <button data-view="fav"><span>收藏</span><span class="dot"></span></button>
  <button data-view="popular"><span>常用</span><span class="dot"></span></button>
  <button data-view="recent"><span>最新</span><span class="dot"></span></button>
</nav>

<script>
/* =====================================================================
 * 設定：換成你部署 Apps Script 後拿到的網址（結尾是 /exec）
 * ===================================================================== */
const API_URL ='https://script.google.com/macros/s/AKfycbyCjqxwnXp87Y_jgt6I8ChTEtrSZmXU5i1McajKvKYjItvhxeWLbUP2LUgc5dk0C7cR/exec';

const FAV_KEY   = 'index_favorites_v1';
const USAGE_KEY = 'index_usage_v1';
const CACHE_KEY = 'index_cache_v1';

const els = {
  header:document.getElementById('header'),
  main:document.getElementById('main'),
  skeleton:document.getElementById('skeleton'),
  offline:document.getElementById('offlineNote'),
  count:document.getElementById('count'),
  search:document.getElementById('searchInput'),
  searchWrap:document.getElementById('searchWrap'),
  clearSearch:document.getElementById('clearSearch'),
  chips:document.getElementById('chips'),
  rail:document.getElementById('rail'),
  tabbar:document.getElementById('tabbar'),
  refreshBtn:document.getElementById('refreshBtn'),
  installBtn:document.getElementById('installBtn'),
};

let allApps = [];
let activeTags = new Set();
let view = 'alpha';          // alpha | fav | popular | recent
let loaded = false;

/* ---------- 本機狀態 ---------- */
const readJSON = (k, fallback)=>{ try{ return JSON.parse(localStorage.getItem(k)) ?? fallback; }catch(e){ return fallback; } };
const writeJSON = (k, v)=>{ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} };

let favorites = new Set(readJSON(FAV_KEY, []));
let usage = readJSON(USAGE_KEY, {});

const keyOf = a => (a.app + '::' + a.url).trim().toLowerCase();
const escapeHtml = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function domainOf(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return url; } }

function toggleFavorite(id, btn){
  const on = !favorites.has(id);
  on ? favorites.add(id) : favorites.delete(id);
  writeJSON(FAV_KEY, [...favorites]);
  if(navigator.vibrate) navigator.vibrate(8);
  if(view === 'fav' || view === 'alpha'){ render(); }   // 收藏區需要重排
  else if(btn){ btn.classList.toggle('active', on); btn.textContent = on ? '★' : '☆'; }
}
function trackUsage(id){
  usage[id] = (usage[id] || 0) + 1;
  writeJSON(USAGE_KEY, usage);
}

/* ---------- 卡片 ---------- */
function cardHtml(a){
  const id = keyOf(a);
  const fav = favorites.has(id);
  const tags = (a.tags || []).slice(0,2);
  return `
    <div class="card">
      <a class="stretched-link" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer"
         aria-label="開啟 ${escapeHtml(a.app)}" data-track="${escapeHtml(id)}"></a>
      <span class="no">No. ${String(a.id).padStart(3,'0')}</span>
      <button class="star ${fav?'active':''}" data-fav="${escapeHtml(id)}"
              aria-pressed="${fav}" aria-label="收藏 ${escapeHtml(a.app)}">${fav?'★':'☆'}</button>
      <h2>${escapeHtml(a.app)}</h2>
      <p>${escapeHtml(a.describe || '（尚無說明）')}</p>
      ${tags.length ? `<div class="tag-row">${tags.map(t=>`<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="foot">
        <span class="domain">${escapeHtml(domainOf(a.url))}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.7"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
      </div>
    </div>`;
}

/* 事件委派：一次綁在 main 上，重繪時不必重新綁 */
els.main.addEventListener('click', (e)=>{
  const star = e.target.closest('[data-fav]');
  if(star){ e.preventDefault(); e.stopPropagation(); toggleFavorite(star.dataset.fav, star); return; }
  const link = e.target.closest('[data-track]');
  if(link) trackUsage(link.dataset.track);
});

/* ---------- 篩選與排序 ---------- */
function computeFiltered(){
  const q = els.search.value.trim().toLowerCase();
  let list = allApps.filter(a=>{
    const okQ = !q
      || a.app.toLowerCase().includes(q)
      || (a.describe||'').toLowerCase().includes(q)
      || (a.tags||[]).some(t=> t.toLowerCase().includes(q));
    const okT = activeTags.size === 0 || (a.tags||[]).some(t=> activeTags.has(t));
    return okQ && okT;
  });
  if(view === 'fav') list = list.filter(a=> favorites.has(keyOf(a)));
  if(view === 'popular') list = list.filter(a=> usage[keyOf(a)]);

  if(view === 'recent')       list.sort((a,b)=> b.id - a.id);
  else if(view === 'popular') list.sort((a,b)=> (usage[keyOf(b)]||0) - (usage[keyOf(a)]||0));
  else                        list.sort((a,b)=> a.app.localeCompare(b.app, 'zh-Hant'));
  return list;
}

function groupByLetter(apps){
  const g = {};
  apps.forEach(a=>{
    let L = (a.app.trim()[0] || '#').toUpperCase();
    if(!/[A-Z]/.test(L)) L = '#';
    (g[L] ||= []).push(a);
  });
  return Object.keys(g).sort().map(L=>({ letter:L, items:g[L] }));
}

function renderChips(){
  const tags = [...new Set(allApps.flatMap(a=> a.tags || []))].sort((a,b)=> a.localeCompare(b,'zh-Hant'));
  els.chips.innerHTML =
    tags.map(t=>`<button data-tag="${escapeHtml(t)}" class="${activeTags.has(t)?'active':''}">${escapeHtml(t)}</button>`).join('')
    + (activeTags.size ? `<button class="clear-tags" data-clear="1">清除 ×</button>` : '');
}
els.chips.addEventListener('click', (e)=>{
  const b = e.target.closest('button'); if(!b) return;
  if(b.dataset.clear){ activeTags.clear(); }
  else{ const t = b.dataset.tag; activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); }
  render();
});

function emptyState(){
  if(view === 'fav')
    return `<div class="state"><h3>還沒有收藏</h3><p>點卡片右上角的星星，常用的工具就會釘在這一頁。</p></div>`;
  if(view === 'popular')
    return `<div class="state"><h3>還沒有使用紀錄</h3><p>開啟幾個工具之後，這裡會依照你開啟的次數排序。</p></div>`;
  return `<div class="state"><h3>沒有符合的項目</h3><p>換個關鍵字，或清除標籤篩選。</p></div>`;
}

function render(){
  if(!loaded) return;
  renderChips();

  if(allApps.length === 0){
    els.rail.hidden = true;
    els.count.textContent = '';
    els.main.innerHTML = `<div class="state"><h3>目錄是空的</h3><p>在試算表新增一列（App / Url / Describe），再回到這裡重新讀取。</p><button class="retry" id="retryBtn">重新讀取</button></div>`;
    document.getElementById('retryBtn').onclick = ()=> load(true);
    return;
  }

  const list = computeFiltered();
  els.count.textContent = `${list.length}/${allApps.length}`;

  if(list.length === 0){
    els.rail.hidden = true;
    els.main.innerHTML = emptyState();
    return;
  }

  let html = '';
  if(view === 'alpha'){
    const pinned = list.filter(a=> favorites.has(keyOf(a)));
    if(pinned.length) html += `<h2 class="section-label">★ 收藏</h2><div class="grid">${pinned.map(cardHtml).join('')}</div>`;
    const groups = groupByLetter(list);
    els.rail.hidden = false;
    els.rail.innerHTML = groups.map(g=>`<button data-letter="${g.letter}">${g.letter}</button>`).join('');
    html += groups.map(g=>`<h2 class="section-label" id="sec-${g.letter}">${g.letter}</h2><div class="grid">${g.items.map(cardHtml).join('')}</div>`).join('');
  }else{
    els.rail.hidden = true;
    const label = { fav:'★ 收藏', popular:'常用優先', recent:'最新加入' }[view];
    html += `<h2 class="section-label">${label}</h2><div class="grid">${list.map(cardHtml).join('')}</div>`;
  }
  els.main.innerHTML = html;
  els.main.prepend(els.offline);
}

els.rail.addEventListener('click', (e)=>{
  const b = e.target.closest('button'); if(!b) return;
  document.getElementById('sec-' + b.dataset.letter)?.scrollIntoView({ block:'start' });
});

/* ---------- 分頁列 ---------- */
els.tabbar.addEventListener('click', (e)=>{
  const b = e.target.closest('button'); if(!b) return;
  view = b.dataset.view;
  [...els.tabbar.children].forEach(x=> x.classList.toggle('active', x === b));
  window.scrollTo({ top:0 });
  render();
});

/* ---------- 搜尋 ---------- */
let searchTimer;
els.search.addEventListener('input', ()=>{
  els.searchWrap.classList.toggle('filled', els.search.value !== '');
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 120);
});
els.search.addEventListener('keydown', e=>{ if(e.key === 'Enter') els.search.blur(); });
els.clearSearch.addEventListener('click', ()=>{
  els.search.value = '';
  els.searchWrap.classList.remove('filled');
  render();
  els.search.focus();
});

/* ---------- 捲動時收合品牌列，換更多內容空間 ---------- */
let lastY = 0, ticking = false;
window.addEventListener('scroll', ()=>{
  if(ticking) return;
  ticking = true;
  requestAnimationFrame(()=>{
    const y = window.scrollY;
    els.header.classList.toggle('compact', y > 60 && y > lastY);
    lastY = y;
    ticking = false;
  });
}, { passive:true });

/* 讓 A–Z 跳頁不被吸頂列擋住 */
const syncHeaderHeight = ()=>
  document.documentElement.style.setProperty('--header-h', els.header.offsetHeight + 'px');
new ResizeObserver(syncHeaderHeight).observe(els.header);

/* ---------- 讀取資料（JSONP，避開 Apps Script 沒有 CORS 標頭的問題） ---------- */
function loadViaJsonp(){
  return new Promise((resolve, reject)=>{
    const cb = 'indexCb_' + Date.now();
    const s = document.createElement('script');
    let done = false;
    const cleanup = ()=>{ delete window[cb]; s.remove(); };
    window[cb] = d=>{ done = true; cleanup(); resolve(d); };
    s.src = `${API_URL}?action=list&callback=${cb}&_=${Date.now()}`;
    s.onerror = ()=>{ if(!done){ cleanup(); reject(new Error('jsonp failed')); } };
    setTimeout(()=>{ if(!done){ cleanup(); reject(new Error('timeout')); } }, 12000);
    document.body.appendChild(s);
  });
}

async function load(manual){
  const cached = readJSON(CACHE_KEY, null);

  // 有快取就先畫出來，開啟 App 幾乎是瞬間有畫面
  if(cached && cached.apps && !loaded){
    allApps = cached.apps;
    loaded = true;
    render();
  }else if(!loaded){
    els.main.innerHTML = '';
    els.main.append(els.offline, els.skeleton);
  }

  els.refreshBtn.classList.add('spin');
  try{
    const data = await loadViaJsonp();
    if(!data.ok) throw new Error('bad payload');
    allApps = data.apps;
    loaded = true;
    writeJSON(CACHE_KEY, { apps:data.apps, at:Date.now() });
    els.offline.classList.remove('show');
    render();
  }catch(err){
    if(loaded){
      els.offline.classList.add('show');   // 有舊資料就繼續用，只提示一行
    }else{
      els.main.innerHTML = `
        <div class="state">
          <h3>讀不到目錄</h3>
          <p>檢查網路連線，或確認 <code>API_URL</code> 指向你的 Apps Script 部署網址，且存取權限設為「任何人」。</p>
          <button class="retry" id="retryBtn">重新讀取</button>
        </div>`;
      document.getElementById('retryBtn').onclick = ()=> load(true);
    }
  }finally{
    els.refreshBtn.classList.remove('spin');
  }
}

els.refreshBtn.addEventListener('click', ()=> load(true));
window.addEventListener('online', ()=>{ if(els.offline.classList.contains('show')) load(); });

load();

/* ---------- 安裝到主畫面 ---------- */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  els.installBtn.hidden = false;
});
els.installBtn.addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  els.installBtn.hidden = true;
});
window.addEventListener('appinstalled', ()=>{ els.installBtn.hidden = true; });

/* ---------- Service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
